name: bitebuddy
description: Meal prep, fasting timer, shopping lists, and offline AI help.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # Database
  drift: ^2.18.0
  drift_flutter: ^0.2.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Onboarding / prefs
  shared_preferences: ^2.3.0

  # Icons
  lucide_icons: ^0.257.0

  # Charts
  fl_chart: ^0.68.0

  # HTTP for Gemini API
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
